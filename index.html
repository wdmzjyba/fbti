<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBTI 深度美食品鉴鉴定 - 究竟谁是良子？</title>
    <style>
        :root {
            --primary: #d62828; /* 深酱色 */
            --warm: #f77f00; /* 炒鸡黄 */
            --highlight: #fcbf49;
            --dark: #003049;
            --bg: #eae2b7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang SC', sans-serif; }
        body { background: var(--bg); color: var(--dark); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 480px; }

        .screen { background: #fff; padding: 35px 25px; border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        
        h1 { font-size: 3.2rem; font-weight: 900; color: var(--primary); margin-bottom: 5px; letter-spacing: -2px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 0.95rem; font-weight: bold; }

        button { 
            background: var(--primary); color: white; border: none; padding: 20px; 
            border-radius: 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            transition: 0.2s; width: 100%; margin-top: 10px;
        }
        button:active { transform: scale(0.96); }

        /* 答题区 */
        .progress-box { width: 100%; height: 10px; background: #eee; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--warm); transition: width 0.3s; }
        .question { font-size: 1.4rem; font-weight: bold; margin-bottom: 25px; text-align: left; line-height: 1.4; color: var(--dark); min-height: 3.5em; }
        .options { display: grid; gap: 12px; }
        .option { 
            background: #f8f9fa; padding: 18px; border-radius: 18px; text-align: left; 
            cursor: pointer; border: 2px solid transparent; transition: 0.2s; font-size: 1.05rem;
        }
        .option:hover { border-color: var(--warm); background: #fffcf0; }

        /* 结果展示 - Bento */
        .persona-name { font-size: 3rem; font-weight: 900; color: var(--primary); margin: 5px 0 25px 0; }
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; text-align: left; }
        .bento-item { background: #fff; padding: 18px; border-radius: 24px; border: 2px solid #f0f0f0; }
        .full { grid-column: span 2; }
        .bento-item label { display: block; font-size: 0.7rem; color: #aaa; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .comment-text { color: var(--primary); font-weight: 800; font-size: 1.1rem; line-height: 1.4; }
        
        .stat-bar { height: 6px; background: #eee; border-radius: 3px; margin-top: 8px; position: relative; overflow: hidden; }
        .stat-fill { position: absolute; height: 100%; background: var(--primary); }

        .hidden { display: none; }
        .footer { margin-top: 25px; font-size: 0.75rem; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="screen">
        <div style="font-size: 4.5rem; margin-bottom: 10px;">🍗</div>
        <h1>FBTI</h1>
        <p class="subtitle">美食品鉴人格鉴定报告<br>特别针对：板面/炒鸡/老饕</p>
        <button onclick="startQuiz()">开始美食鉴定</button>
    </div>

    <div id="quiz-screen" class="screen hidden">
        <div class="progress-box"><div class="progress-fill" id="p-fill" style="width: 0%"></div></div>
        <div class="question" id="q-text">Loading...</div>
        <div class="options" id="options"></div>
    </div>

    <div id="result-screen" class="screen hidden">
        <p style="font-size: 0.9rem; color: #666;">深度扫描结果，你的品鉴人格：</p>
        <div class="persona-name" id="res-name">大胃袋良子</div>
        
        <div class="bento-grid">
            <div class="bento-item full">
                <label>🔥 职场/饭桌锐评</label>
                <p id="res-comment" class="comment-text"></p>
            </div>
            <div class="bento-item">
                <label>👅 觅食指数</label>
                <div style="font-size: 0.75rem;">执念程度 <div class="stat-bar"><div class="stat-fill" id="b-obs"></div></div></div>
                <div style="font-size: 0.75rem; margin-top: 5px;">食量上限 <div class="stat-bar"><div class="stat-fill" id="b-vol" style="background:var(--warm)"></div></div></div>
            </div>
            <div class="bento-item">
                <label>💡 推荐偏好</label>
                <p id="res-pref" style="font-size: 0.85rem; font-weight: bold;"></p>
            </div>
            <div class="bento-item full" style="background: #003049; color: white;">
                <label style="color: #669bbc;">🍲 灵魂总结</label>
                <p id="res-advice" style="font-size: 0.9rem; line-height: 1.4;"></p>
            </div>
        </div>
        
        <button onclick="location.reload()" style="background:#666; margin-top: 20px;">重新测试</button>
        <div class="footer">FBTI Special Edition · 2024</div>
    </div>
</div>

<script>
    const questions = [
        // 强制前置题 1
        {q:"听哥们说20公里外有个路边摊，2元一串的烧烤绝了：", a:"废话，现在就出发，路远才说明是真货", b:"20公里？来回油钱都能吃顿火锅了，不去", dim:"OBS", sa:10, sb:1},
        // 强制前置题 2
        {q:"外面下着瓢泼大雨，由于执念你现在想吃临沂炒鸡：", a:"天上下刀子也拦不住我，雨大更有氛围", b:"点个外卖得了，实在不行吃泡面也能活", dim:"OBS", sa:10, sb:1},
        
        // 逻辑纠正题：主食偏好
        {q:"中午只有二选一，你更倾向于：", a:"安徽板面（加面加蛋加豆皮，汤要宽油）", b:"兰溪手擀面（清爽简单，填饱肚子就行）", dim:"SPECIAL", sa:0, sb:0},

        // 其它维度
        {q:"饭桌上大家都放下筷子了，还剩不少菜：", a:"只要我还能喘气，必须清盘，绝不浪费", b:"矜持放下，看着服务员收走", dim:"VOL", sa:5, sb:1},
        {q:"去外地旅游，你的行程安排通常是：", a:"全是好吃的店，景点只是消食的空隙", b:"主要是看风景，吃饭随缘", dim:"EXP", sa:5, sb:1},
        {q:"关于‘手机先吃’，你的态度：", a:"全方位构图滤镜，调好才准动筷", b:"谁敢拦着我夹第一筷子我跟谁急", dim:"EXP", sa:5, sb:1},
        {q:"菜单上标注‘变态辣’，你的反应：", a:"兴奋，挑战极限", b:"恐惧，保护肠胃", dim:"STIM", sa:5, sb:1},
        {q:"关于香菜、葱蒜、折耳根：", a:"那是食物的灵魂，必须加满", b:"只要有一粒，这顿饭就毁了", dim:"STIM", sa:5, sb:1},
        {q:"火锅蘸料台前，你是：", a:"炼金术士，各种酱料调制三大碗", b:"清淡派，最多只要点香油碟", dim:"STIM", sa:5, sb:1},
        {q:"一个人吃饭时，你的点餐量：", a:"想吃的都点，大不了打包（或者当场吃完）", b:"严谨点一份主食，刚好饱就行", dim:"VOL", sa:5, sb:1},
        {q:"听说一家店排队需要3小时，你会：", a:"拿个小板凳坐等，刷剧度过", b:"看到排队超过30分钟直接拉黑", dim:"OBS", sa:5, sb:1},
        {q:"对于精致但分量极小的昂贵料理：", a:"为了审美和仪式感可以偶尔奢侈", b:"这种分量简直是诈骗，不如吃大排档", dim:"EXP", sa:1, sb:5},
        {q:"凌晨三点饿醒了：", a:"必须搜出附近还在开门的宵夜", b:"喝口水强迫自己睡着", dim:"OBS", sa:5, sb:1},
        {q:"如果你发现饭菜不好吃：", a:"为了填饱肚子忍辱负重吃完", b:"吃两口就放下，宁愿饿着", dim:"VOL", sa:5, sb:1},
        {q:"关于卡路里计算：", a:"吃完这顿再减，吃饭时谈热量是扫兴", b:"每一口都在心里换算成跑步里程", dim:"VOL", sa:5, sb:1}
    ];

    const personas = [
        { name: "大胃袋良子", vector: [25, 25, 10, 15, 10], comment: "饭桌上的黑洞，板面界的荣誉会长。你对碳水的执念能让所有健身教练沉默。", pref: "重油板面 / 临沂炒鸡 / 任何能加面的食物", advice: "你的胃部空间比Flash还大，建议聚餐时坐在离菜最近的地方。" },
        { name: "喂啥吃啥圣人", vector: [5, 5, 5, 5, 5], comment: "人类进化时的漏网之鱼，美食界的虚无主义者。对你来说，兰溪手擀面和米其林三星的区别只是‘饱了’和‘没饱’。", pref: "兰溪手擀面 / 白米饭 / 各种平替", advice: "你是全天下请客者的福音，因为你真的很好对付。" },
        { name: "地漆凳老饕", vector: [25, 15, 25, 25, 5], comment: "瞧不起白地毯，坚信绝顶美味只存在于20公里外、漏雨的破烂路边摊。", pref: "2元烧烤 / 巷子深处的苍蝇馆子", advice: "你的油钱够买一个米其林轮胎了，但我懂，那是信仰。" },
        { name: "手机先吃教主", vector: [10, 10, 25, 10, 25], comment: "你吃的不是饭，是朋友圈的社交货币。菜凉了没关系，滤镜必须热乎。", pref: "颜值极高的网红甜品", advice: "建议买个加热快门，因为你的饭总是凉的。" },
        { name: "变态辣战神", vector: [15, 15, 10, 25, 10], comment: "味觉已经基本退化，只有重辣重盐才能唤醒你的灵魂。", pref: "变态辣鸡翅 / 特辣火锅", advice: "为了明天的肠道尊严，请少放两勺辣椒。" },
        { name: "香菜暗杀者", vector: [10, 15, 15, 5, 10], comment: "味蕾敏感度堪比军用雷达。只要有一粒香菜，你就能在桌上表演原地爆炸。", pref: "无葱无蒜无香菜的一切", advice: "建议出门自带‘禁加调料’的刻章。" },
        { name: "精致伪贵族", vector: [5, 5, 25, 5, 25], comment: "吃的是氛围，喝的是酒标。只要餐具够艺术，白开水也能喝出拉菲的味道。", pref: "Fine Dining / 这种名字很难读的菜", advice: "仪式感虽好，但也别饿着肚子回家补泡面。" },
        { name: "菜单调研员", vector: [20, 15, 25, 15, 15], comment: "点菜逻辑严密到让人发指。你是饭桌上的首席算法工程师。", pref: "评价最高的招牌菜组合", advice: "稍微放松点，偶尔点错一个菜并不会导致宇宙毁灭。" }
    ];

    let currentIdx = 0;
    let userScores = { OBS: 0, VOL: 0, EXP: 0, STIM: 0 };
    let flagLiangzi = false;
    let flagSaint = false;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('p-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
        
        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        
        [{t:q.a, s:q.sa}, {t:q.b, s:q.sb}].forEach((o, index) => {
            let div = document.createElement('div');
            div.className = 'option';
            div.innerText = o.t;
            div.onclick = () => {
                // 特殊逻辑纠正
                if (q.dim === "SPECIAL") {
                    if (index === 0) flagLiangzi = true;
                    if (index === 1) flagSaint = true;
                } else {
                    userScores[q.dim] += o.s;
                }
                
                currentIdx++;
                if(currentIdx < questions.length) showQuestion(); else showResult();
            };
            optCont.appendChild(div);
        });
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        // 纠正逻辑应用
        if (flagLiangzi) { userScores.VOL += 15; userScores.OBS += 5; }
        if (flagSaint) { userScores.EXP -= 15; userScores.OBS -= 10; }

        const uVec = [userScores.OBS, userScores.VOL, userScores.EXP, userScores.STIM];
        let minD = Infinity;
        let matched = personas[0];

        personas.forEach(p => {
            let d = 0;
            // 使用简化的 4 维距离计算
            d += Math.abs(userScores.OBS - p.vector[0]);
            d += Math.abs(userScores.VOL - p.vector[1]);
            d += Math.abs(userScores.EXP - p.vector[2]);
            d += Math.abs(userScores.STIM - p.vector[3]);
            
            if(d < minD) { minD = d; matched = p; }
        });

        document.getElementById('res-name').innerText = matched.name;
        document.getElementById('res-comment').innerText = matched.comment;
        document.getElementById('res-pref').innerText = matched.pref;
        document.getElementById('res-advice').innerText = matched.advice;
        
        document.getElementById('b-obs').style.width = (Math.min(userScores.OBS, 25) / 25 * 100) + '%';
        document.getElementById('b-vol').style.width = (Math.min(userScores.VOL, 25) / 25 * 100) + '%';
    }
</script>

</body>
</html>
